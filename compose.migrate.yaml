services:
  postgres:
    image: 'postgis/postgis:15-3.4'
    ports:
      - 5432:5432
    volumes:
      - db_data:/var/lib/postgresql/data
    secrets: &db_secrets
      - db_password
    environment: &db_env
      POSTGRES_DB: tcmmap
      POSTGRES_USER: tcmmap
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password
  migrate:
    build:
      context: .
      dockerfile: src/server/db/docker/Dockerfile
    depends_on:
      - postgres
    secrets: *db_secrets
    environment:
      <<: *db_env
      PGHOST: postgres
      DOTENV_KEY: 'dotenv://:key_3140a1b2b37abf2d65b40c6d70906f801587662b228f17aa89506f539bd20aa3@dotenv.org/vault/.env.vault?environment=production'

secrets:
  db_password:
    file: .secrets/db_password.txt

volumes:
  db_data:
